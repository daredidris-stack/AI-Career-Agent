services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: career_agent
      POSTGRES_USER: career_agent
      POSTGRES_PASSWORD: local-only-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_agent -d career_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://career_agent:local-only-password@database:5432/career_agent
      JWT_SECRET_KEY: local-compose-secret-change-me
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
